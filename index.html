<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2 Ans d'Amour 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ee9ca7 100%);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Cœurs flottants */
    .heart {
      position: fixed;
      font-size: 20px;
      animation: floatUp 6s ease-in infinite;
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 800px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      color: #fff;
      text-shadow: 2px 2px 20px rgba(0,0,0,0.2);
      margin-bottom: 10px;
      animation: fadeInDown 1s ease;
    }

    .subtitle {
      font-size: 1.3rem;
      color: #fff;
      opacity: 0.95;
      margin-bottom: 40px;
      text-shadow: 1px 1px 10px rgba(0,0,0,0.15);
      animation: fadeInUp 1s ease 0.3s both;
    }

    .question-box {
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      animation: fadeInUp 0.8s ease;
    }

    .question-number {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .question-text {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #fff;
      margin-bottom: 40px;
      line-height: 1.3;
      text-shadow: 1px 1px 10px rgba(0,0,0,0.15);
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      min-height: 80px;
    }

    .btn {
      padding: 16px 40px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      z-index: 20;
    }

    .btn-yes {
      background: #fff;
      color: #e74c3c;
      box-shadow: 0 8px 25px rgba(231,76,60,0.3);
    }
    .btn-yes:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 35px rgba(231,76,60,0.4);
    }

    .btn-trap, .btn-trap-clone {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 8px 25px rgba(102,126,234,0.3);
      position: absolute;
      transition: none !important;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn-trap.fleeing, .btn-trap-clone.fleeing {
      opacity: 0.4;
      transform: scale(0.7);
    }

    .start-screen, .end-screen {
      animation: fadeInUp 1s ease;
    }

    .start-btn {
      padding: 20px 60px;
      font-size: 1.3rem;
      background: #fff;
      color: #e74c3c;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      margin-top: 30px;
    }
    .start-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .score-display {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 20px;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .hidden { display: none !important; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .end-title {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: #fff;
      margin-bottom: 20px;
      text-shadow: 2px 2px 20px rgba(0,0,0,0.2);
    }

    .end-message {
      font-size: 1.2rem;
      color: #fff;
      line-height: 1.8;
      max-width: 500px;
      margin-bottom: 30px;
      text-shadow: 1px 1px 10px rgba(0,0,0,0.15);
    }

    .final-score {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    .emoji-big { font-size: 4rem; margin-bottom: 20px; }

    /* Photos */
    .hero-photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid rgba(255,255,255,0.6);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 20px;
      animation: fadeInUp 1s ease 0.2s both;
    }

    .photo-gallery {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 25px 0;
      perspective: 800px;
    }
    .polaroid {
      background: #fff;
      padding: 10px 10px 35px 10px;
      border-radius: 4px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      transform: rotate(var(--rot, -3deg));
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeInUp 0.8s ease both;
    }
    .polaroid:nth-child(2) { --rot: 4deg; animation-delay: 0.15s; }
    .polaroid:nth-child(3) { --rot: -2deg; animation-delay: 0.3s; }
    .polaroid:hover {
      transform: rotate(0deg) scale(1.08);
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      z-index: 10;
    }
    .polaroid img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 2px;
      display: block;
    }
    .polaroid-caption {
      position: absolute;
      bottom: 8px;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      color: #555;
    }

    /* Confettis */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 200;
      animation: confettiFall 3s ease-in forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      .question-text { font-size: 1.5rem; }
      .question-box { padding: 30px 20px; }
      .btn { padding: 14px 28px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div id="hearts-container"></div>
  <div id="confetti-container"></div>

  <div class="score-display hidden" id="scoreDisplay">
    ❤️ Tentatives échouées : <span id="failCount">0</span>
  </div>

  <div class="container">
    <!-- Écran d'accueil -->
    <div class="start-screen" id="startScreen">
      <img src="photo1.jpg" alt="Nous" class="hero-photo">
      <h1>2 Ans d'Amour</h1>
      <p class="subtitle">Un petit jeu pour célébrer notre mariage<br>Es-tu prête, mon amour ?</p>
      <button class="start-btn" onclick="startGame()">Commencer le quiz 💕</button>
    </div>

    <!-- Quiz -->
    <div class="question-box hidden" id="quizBox">
      <div class="question-number" id="questionNum">Question 1 / 5</div>
      <div class="question-text" id="questionText"></div>
      <div class="buttons" id="buttonsContainer">
        <button class="btn btn-yes" id="btnYes" onclick="handleYes()">Oui 💕</button>
        <button class="btn btn-trap" id="btnTrap">Non 😈</button>
      </div>
    </div>

    <!-- Écran final -->
    <div class="end-screen hidden" id="endScreen">
      <div class="emoji-big">🎉💍🥂</div>
      <div class="end-title">Tu as survécu !</div>
      <div class="final-score" id="finalScore"></div>
      <div class="end-message" id="endMessage"></div>
      <div class="photo-gallery">
        <div class="polaroid" style="position:relative;">
          <img src="photo1.jpg" alt="Notre mariage">
          <span class="polaroid-caption">Le grand jour ✨</span>
        </div>
        <div class="polaroid" style="position:relative;">
          <img src="photo2.jpg" alt="Nous deux">
          <span class="polaroid-caption">Mon âme sœur 💕</span>
        </div>
        <div class="polaroid" style="position:relative;">
          <img src="photo3.jpg" alt="Notre amour">
          <span class="polaroid-caption">Pour toujours 💍</span>
        </div>
      </div>
      <button class="start-btn" onclick="location.reload()">Rejouer 💖</button>
    </div>
  </div>

  <script>
    // ============= QUESTIONS =============
    const questions = [
      {
        text: "Qui est le/la plus beau/belle dans ce couple ?",
        yes: "C'est toi mon amour 😍",
        trap: "C'est moi la plus belle 💅",
        trapType: "runaway",
        message: "Bonne réponse ! Tu es la plus belle à mes yeux 💖"
      },
      {
        text: "Qui porte le pantalon dans le couple ?",
        yes: "C'est toi le patron mon mari 👑",
        trap: "C'est moi la patronne 💁‍♀️",
        trapType: "shrink",
        message: "Tu as bien raison... c'est toi le chef, je te suis partout 😉"
      },
      {
        text: "Qui est le meilleur cuisinier ?",
        yes: "C'est toi mon chef 👨‍🍳",
        trap: "C'est moi la reine des fourneaux 👸",
        trapType: "teleport",
        message: "Ton tajine est légendaire, le mien est... mangeable 😂"
      },
      {
        text: "Qui est le plus intelligent ?",
        yes: "C'est toi mon génie 🧠",
        trap: "C'est moi la plus intelligente 🎓",
        trapType: "multiply",
        message: "On est le couple le plus brillant du monde ! 💡"
      },
      {
        text: "Qui aime le plus dans ce couple ?",
        yes: "C'est toi mon grand amour 💕",
        trap: "C'est moi qui t'aime le plus 💖",
        trapType: "chase",
        message: "On s'aime autant l'un que l'autre... pour toujours 💍"
      }
    ];

    // ============= ÉTAT =============
    let currentQ = 0;
    let failCount = 0;
    let trapClicks = 0;
    let isTransitioning = false;

    // ============= CŒURS FLOTTANTS =============
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = ['💕','💖','💗','💓','💝'][Math.floor(Math.random()*5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (15 + Math.random() * 25) + 'px';
      heart.style.animationDuration = (4 + Math.random() * 4) + 's';
      document.getElementById('hearts-container').appendChild(heart);
      setTimeout(() => heart.remove(), 8000);
    }
    setInterval(createHeart, 600);

    // ============= CONFETTIS =============
    function launchConfetti() {
      const colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd'];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
          c.style.animationDuration = (2 + Math.random() * 2) + 's';
          document.getElementById('confetti-container').appendChild(c);
          setTimeout(() => c.remove(), 4000);
        }, i * 30);
      }
    }

    // ============= NAVIGATION =============
    function startGame() {
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('quizBox').classList.remove('hidden');
      document.getElementById('scoreDisplay').classList.remove('hidden');
      loadQuestion();
    }

    function loadQuestion() {
      isTransitioning = false;
      trapClicks = 0;
      const q = questions[currentQ];
      document.getElementById('questionNum').textContent = `Question ${currentQ + 1} / ${questions.length}`;
      document.getElementById('questionText').textContent = q.text;

      const btnYes = document.getElementById('btnYes');
      const btnTrap = document.getElementById('btnTrap');

      btnYes.textContent = q.yes;
      btnTrap.textContent = q.trap;

      // Reset styles
      btnTrap.style.position = 'relative';
      btnTrap.style.transform = 'none';
      btnTrap.style.opacity = '1';
      btnTrap.style.left = 'auto';
      btnTrap.style.top = 'auto';
      btnTrap.style.width = 'auto';
      btnTrap.style.height = 'auto';
      btnTrap.style.fontSize = '';

      // Remove clones
      document.querySelectorAll('.btn-trap-clone').forEach(el => el.remove());

      setupTrap(q.trapType);
    }

    function handleYes() {
      if (isTransitioning) return;
      isTransitioning = true;
      launchConfetti();
      currentQ++;

      if (currentQ >= questions.length) {
        setTimeout(showEnd, 500);
      } else {
        document.getElementById('quizBox').style.animation = 'none';
        setTimeout(() => {
          document.getElementById('quizBox').style.animation = 'fadeInUp 0.8s ease';
          loadQuestion();
        }, 100);
      }
    }

    function showEnd() {
      document.getElementById('quizBox').classList.add('hidden');
      document.getElementById('scoreDisplay').classList.add('hidden');
      document.getElementById('endScreen').classList.remove('hidden');
      document.getElementById('finalScore').textContent = `${failCount} tentatives de triche déjouées 😂`;
      document.getElementById('endMessage').innerHTML =
        `Mon amour,<br><br>` +
        `Depuis 2 ans, tu es la meilleure chose qui me soit arrivée.<br>` +
        `Même quand tu veux cliquer sur "non", je sais que au fond...<br>` +
        `tu penses "oui" 💕<br><br>` +
        `Joyeux anniversaire de mariage, mon cœur.<br>` +
        `Pour toujours et à jamais.`;
      launchConfetti();
      setInterval(launchConfetti, 3000);
    }

    // ============= PIÈGES IMPOSSIBLES =============
    let currentTrapMouseHandler = null;

    function setupTrap(type) {
      const btn = document.getElementById('btnTrap');
      const container = document.getElementById('buttonsContainer');

      // Clean up old handler
      if (currentTrapMouseHandler) {
        container.removeEventListener('mousemove', currentTrapMouseHandler);
        currentTrapMouseHandler = null;
      }

      // Reset button
      btn.style.position = 'absolute';
      btn.style.left = '50%';
      btn.style.top = '0';
      btn.style.transform = 'translateX(-50%)';
      btn.style.opacity = '1';
      btn.style.fontSize = '';
      btn.style.width = 'auto';
      btn.style.height = 'auto';
      btn.classList.remove('fleeing');

      // Remove clones
      document.querySelectorAll('.btn-trap-clone').forEach(el => el.remove());

      // Base anti-click handler
      const avoidMouse = (e, targetBtn, threshold = 220, pushMult = 1) => {
        const rect = container.getBoundingClientRect();
        const btnRect = targetBtn.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const btnCX = btnRect.left - rect.left + btnRect.width / 2;
        const btnCY = btnRect.top - rect.top + btnRect.height / 2;
        const dx = btnCX - mouseX;
        const dy = btnCY - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < threshold) {
          // Teleport to farthest corner from mouse
          const corners = [
            { x: 10, y: 10 },
            { x: rect.width - btnRect.width - 10, y: 10 },
            { x: 10, y: rect.height - btnRect.height - 10 },
            { x: rect.width - btnRect.width - 10, y: rect.height - btnRect.height - 10 },
            { x: (rect.width - btnRect.width) / 2, y: 10 },
            { x: (rect.width - btnRect.width) / 2, y: rect.height - btnRect.height - 10 },
          ];
          let bestCorner = corners[0];
          let bestDist = -1;
          corners.forEach(c => {
            const cd = Math.sqrt((c.x - mouseX) ** 2 + (c.y - mouseY) ** 2);
            if (cd > bestDist) { bestDist = cd; bestCorner = c; }
          });

          targetBtn.style.left = bestCorner.x + 'px';
          targetBtn.style.top = bestCorner.y + 'px';
          targetBtn.classList.add('fleeing');

          setTimeout(() => targetBtn.classList.remove('fleeing'), 150);
          failCount++;
          updateScore();
          return true;
        }
        return false;
      };

      switch(type) {
        case 'runaway': {
          // Button teleports to farthest corner when mouse is within 250px
          currentTrapMouseHandler = (e) => {
            avoidMouse(e, btn, 250, 1);
          };
          container.addEventListener('mousemove', currentTrapMouseHandler);
          btn.onclick = () => { failCount++; updateScore(); };
          break;
        }

        case 'shrink': {
          // Button shrinks each time mouse approaches; becomes nearly invisible
          let currentScale = 1;
          currentTrapMouseHandler = (e) => {
            const rect = container.getBoundingClientRect();
            const btnRect = btn.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const btnCX = btnRect.left - rect.left + btnRect.width / 2;
            const btnCY = btnRect.top - rect.top + btnRect.height / 2;
            const dist = Math.sqrt((btnCX - mouseX) ** 2 + (btnCY - mouseY) ** 2);

            if (dist < 260) {
              currentScale = Math.max(0.15, currentScale * 0.75);
              btn.style.transform = `translateX(-50%) scale(${currentScale})`;
              btn.style.opacity = Math.max(0.15, currentScale);
              if (currentScale <= 0.2) btn.textContent = "Trop tard 😂";

              // Also teleport away
              const corners = [
                { x: 10, y: 10 },
                { x: rect.width - btnRect.width - 10, y: 10 },
                { x: 10, y: rect.height - btnRect.height - 10 },
                { x: rect.width - btnRect.width - 10, y: rect.height - btnRect.height - 10 },
              ];
              let best = corners[0], bestD = -1;
              corners.forEach(c => {
                const d = Math.sqrt((c.x - mouseX) ** 2 + (c.y - mouseY) ** 2);
                if (d > bestD) { bestD = d; best = c; }
              });
              btn.style.left = best.x + 'px';
              btn.style.top = best.y + 'px';
              btn.style.transform = `scale(${currentScale})`;

              failCount++;
              updateScore();
            }
          };
          container.addEventListener('mousemove', currentTrapMouseHandler);
          btn.onclick = () => { failCount++; updateScore(); };
          break;
        }

        case 'teleport': {
          // Button becomes invisible and teleports constantly near mouse
          currentTrapMouseHandler = (e) => {
            const rect = container.getBoundingClientRect();
            const btnRect = btn.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const btnCX = btnRect.left - rect.left + btnRect.width / 2;
            const btnCY = btnRect.top - rect.top + btnRect.height / 2;
            const dist = Math.sqrt((btnCX - mouseX) ** 2 + (btnCY - mouseY) ** 2);

            if (dist < 270) {
              // Pick random far position
              let nx, ny, d;
              let attempts = 0;
              do {
                nx = Math.random() * (rect.width - btnRect.width - 20) + 10;
                ny = Math.random() * (rect.height - btnRect.height - 20) + 10;
                d = Math.sqrt((nx - mouseX) ** 2 + (ny - mouseY) ** 2);
                attempts++;
              } while (d < 220 && attempts < 20);

              btn.style.left = nx + 'px';
              btn.style.top = ny + 'px';
              btn.style.opacity = '0.25';
              setTimeout(() => { btn.style.opacity = '1'; }, 200);
              failCount++;
              updateScore();
            }
          };
          container.addEventListener('mousemove', currentTrapMouseHandler);
          btn.onclick = () => { failCount++; updateScore(); };
          break;
        }

        case 'multiply': {
          // Pluie infinie de petits boutons "moi" partout sur l'écran
          const spawnMoi = (avoidX, avoidY) => {
            const rect = container.getBoundingClientRect();
            const clone = document.createElement('button');
            clone.className = 'btn btn-trap btn-trap-clone';
            clone.textContent = 'moi';
            clone.style.position = 'absolute';
            clone.style.transform = 'none';
            clone.style.fontSize = '0.65rem';
            clone.style.padding = '6px 12px';
            clone.style.borderRadius = '20px';
            clone.style.minWidth = 'auto';
            clone.style.zIndex = '30';

            let nx, ny, d;
            let attempts = 0;
            do {
              nx = Math.random() * (rect.width - 60) + 5;
              ny = Math.random() * (rect.height - 30) + 5;
              d = Math.sqrt((nx - avoidX) ** 2 + (ny - avoidY) ** 2);
              attempts++;
            } while (d < 100 && attempts < 20);

            clone.style.left = nx + 'px';
            clone.style.top = ny + 'px';
            clone.onclick = () => { failCount++; updateScore(); };
            container.appendChild(clone);
          };

          currentTrapMouseHandler = (e) => {
            if (avoidMouse(e, btn, 220, 1)) {
              // Spawn 2-4 petits "moi" à chaque fuite
              const mx = e.clientX - container.getBoundingClientRect().left;
              const my = e.clientY - container.getBoundingClientRect().top;
              const count = 2 + Math.floor(Math.random() * 3);
              for (let i = 0; i < count; i++) {
                spawnMoi(mx, my);
              }
            }
            // Tous les petits "moi" fuient aussi
            document.querySelectorAll('.btn-trap-clone').forEach(clone => {
              avoidMouse(e, clone, 80, 1);
            });
          };
          container.addEventListener('mousemove', currentTrapMouseHandler);
          btn.onclick = () => { failCount++; updateScore(); };
          break;
        }

        case 'chase': {
          // Ultra-aggressive: flees with massive push, gets smaller each time
          let chaseScale = 1;
          currentTrapMouseHandler = (e) => {
            const rect = container.getBoundingClientRect();
            const btnRect = btn.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const btnCX = btnRect.left - rect.left + btnRect.width / 2;
            const btnCY = btnRect.top - rect.top + btnRect.height / 2;
            const dx = btnCX - mouseX;
            const dy = btnCY - mouseY;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 280) {
              chaseScale = Math.max(0.2, chaseScale * 0.9);
              const angle = Math.atan2(dy, dx);
              const push = 140;
              let nx = btnCX + Math.cos(angle) * push - btnRect.width / 2;
              let ny = btnCY + Math.sin(angle) * push - btnRect.height / 2;
              nx = Math.max(5, Math.min(rect.width - btnRect.width - 5, nx));
              ny = Math.max(5, Math.min(rect.height - btnRect.height - 5, ny));

              btn.style.left = nx + 'px';
              btn.style.top = ny + 'px';
              btn.style.transform = `scale(${chaseScale})`;
              btn.style.opacity = Math.max(0.2, chaseScale);
              btn.classList.add('fleeing');
              setTimeout(() => btn.classList.remove('fleeing'), 100);
              failCount++;
              updateScore();
            }
          };
          container.addEventListener('mousemove', currentTrapMouseHandler);
          btn.onclick = () => { failCount++; updateScore(); };
          break;
        }
      }
    }

    function updateScore() {
      document.getElementById('failCount').textContent = failCount;
    }
  </script>
</body>
</html>
