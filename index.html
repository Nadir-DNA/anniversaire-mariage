<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2 Ans d'Amour 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ee9ca7 100%);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Cœurs flottants */
    .heart {
      position: fixed;
      font-size: 20px;
      animation: floatUp 6s ease-in infinite;
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 800px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      color: #fff;
      text-shadow: 2px 2px 20px rgba(0,0,0,0.2);
      margin-bottom: 10px;
      animation: fadeInDown 1s ease;
    }

    .subtitle {
      font-size: 1.3rem;
      color: #fff;
      opacity: 0.95;
      margin-bottom: 40px;
      text-shadow: 1px 1px 10px rgba(0,0,0,0.15);
      animation: fadeInUp 1s ease 0.3s both;
    }

    .question-box {
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 50px 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      animation: fadeInUp 0.8s ease;
    }

    .question-number {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .question-text {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #fff;
      margin-bottom: 40px;
      line-height: 1.3;
      text-shadow: 1px 1px 10px rgba(0,0,0,0.15);
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      min-height: 80px;
    }

    .btn {
      padding: 16px 40px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      z-index: 20;
    }

    .btn-yes {
      background: #fff;
      color: #e74c3c;
      box-shadow: 0 8px 25px rgba(231,76,60,0.3);
    }
    .btn-yes:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 35px rgba(231,76,60,0.4);
    }

    .btn-trap {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 8px 25px rgba(102,126,234,0.3);
      position: absolute;
      transition: all 0.2s ease;
    }

    .start-screen, .end-screen {
      animation: fadeInUp 1s ease;
    }

    .start-btn {
      padding: 20px 60px;
      font-size: 1.3rem;
      background: #fff;
      color: #e74c3c;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      margin-top: 30px;
    }
    .start-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .score-display {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 20px;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .hidden { display: none !important; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .end-title {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: #fff;
      margin-bottom: 20px;
      text-shadow: 2px 2px 20px rgba(0,0,0,0.2);
    }

    .end-message {
      font-size: 1.2rem;
      color: #fff;
      line-height: 1.8;
      max-width: 500px;
      margin-bottom: 30px;
      text-shadow: 1px 1px 10px rgba(0,0,0,0.15);
    }

    .final-score {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    .emoji-big { font-size: 4rem; margin-bottom: 20px; }

    /* Confettis */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 200;
      animation: confettiFall 3s ease-in forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      .question-text { font-size: 1.5rem; }
      .question-box { padding: 30px 20px; }
      .btn { padding: 14px 28px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div id="hearts-container"></div>
  <div id="confetti-container"></div>

  <div class="score-display hidden" id="scoreDisplay">
    ❤️ Tentatives échouées : <span id="failCount">0</span>
  </div>

  <div class="container">
    <!-- Écran d'accueil -->
    <div class="start-screen" id="startScreen">
      <div class="emoji-big">💍💖</div>
      <h1>2 Ans d'Amour</h1>
      <p class="subtitle">Un petit jeu pour célébrer notre mariage<br>Es-tu prête, mon amour ?</p>
      <button class="start-btn" onclick="startGame()">Commencer le quiz 💕</button>
    </div>

    <!-- Quiz -->
    <div class="question-box hidden" id="quizBox">
      <div class="question-number" id="questionNum">Question 1 / 5</div>
      <div class="question-text" id="questionText"></div>
      <div class="buttons" id="buttonsContainer">
        <button class="btn btn-yes" id="btnYes" onclick="handleYes()">Oui 💕</button>
        <button class="btn btn-trap" id="btnTrap">Non 😈</button>
      </div>
    </div>

    <!-- Écran final -->
    <div class="end-screen hidden" id="endScreen">
      <div class="emoji-big">🎉💍🥂</div>
      <div class="end-title">Tu as survécu !</div>
      <div class="final-score" id="finalScore"></div>
      <div class="end-message" id="endMessage"></div>
      <button class="start-btn" onclick="location.reload()">Rejouer 💖</button>
    </div>
  </div>

  <script>
    // ============= QUESTIONS =============
    const questions = [
      {
        text: "Est-ce que ton mari est le plus beau ?",
        yes: "Oui, c'est le plus beau 😍",
        trap: "Non il est trop moche 🤢",
        trapType: "runaway",
        message: "Bonne réponse ! Évidemment que je suis le plus beau 😎"
      },
      {
        text: "Qui porte le pantalon dans le couple ?",
        yes: "C'est moi, la patronne 👑",
        trap: "C'est lui, le chef 🧔",
        trapType: "shrink",
        message: "Tu as bien raison... tu portes tout, pantalon compris 😅"
      },
      {
        text: "Qui fait le meilleur café ?",
        yes: "C'est moi, évidemment ☕",
        trap: "C'est lui, le barista 🫗",
        trapType: "teleport",
        message: "Ton café est légendaire, le mien est... buvable 😂"
      },
      {
        text: "Qui est le plus intelligent ?",
        yes: "Égalité, on brille ensemble ✨",
        trap: "C'est lui, le génie 🧠",
        trapType: "multiply",
        message: "On est le couple le plus brillant du monde ! 💡"
      },
      {
        text: "Veux-tu rester avec moi pour toujours ?",
        yes: "Oui, pour l'éternité 💍",
        trap: "Non, j'ai mieux à faire 🏃‍♀️",
        trapType: "chase",
        message: "C'est la meilleure décision de ta vie... et de la mienne 💕"
      }
    ];

    // ============= ÉTAT =============
    let currentQ = 0;
    let failCount = 0;
    let trapClicks = 0;
    let isTransitioning = false;

    // ============= CŒURS FLOTTANTS =============
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = ['💕','💖','💗','💓','💝'][Math.floor(Math.random()*5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (15 + Math.random() * 25) + 'px';
      heart.style.animationDuration = (4 + Math.random() * 4) + 's';
      document.getElementById('hearts-container').appendChild(heart);
      setTimeout(() => heart.remove(), 8000);
    }
    setInterval(createHeart, 600);

    // ============= CONFETTIS =============
    function launchConfetti() {
      const colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd'];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
          c.style.animationDuration = (2 + Math.random() * 2) + 's';
          document.getElementById('confetti-container').appendChild(c);
          setTimeout(() => c.remove(), 4000);
        }, i * 30);
      }
    }

    // ============= NAVIGATION =============
    function startGame() {
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('quizBox').classList.remove('hidden');
      document.getElementById('scoreDisplay').classList.remove('hidden');
      loadQuestion();
    }

    function loadQuestion() {
      isTransitioning = false;
      trapClicks = 0;
      const q = questions[currentQ];
      document.getElementById('questionNum').textContent = `Question ${currentQ + 1} / ${questions.length}`;
      document.getElementById('questionText').textContent = q.text;

      const btnYes = document.getElementById('btnYes');
      const btnTrap = document.getElementById('btnTrap');

      btnYes.textContent = q.yes;
      btnTrap.textContent = q.trap;

      // Reset styles
      btnTrap.style.position = 'relative';
      btnTrap.style.transform = 'none';
      btnTrap.style.opacity = '1';
      btnTrap.style.left = 'auto';
      btnTrap.style.top = 'auto';
      btnTrap.style.width = 'auto';
      btnTrap.style.height = 'auto';
      btnTrap.style.fontSize = '';

      // Remove clones
      document.querySelectorAll('.btn-trap-clone').forEach(el => el.remove());

      setupTrap(q.trapType);
    }

    function handleYes() {
      if (isTransitioning) return;
      isTransitioning = true;
      launchConfetti();
      currentQ++;

      if (currentQ >= questions.length) {
        setTimeout(showEnd, 500);
      } else {
        document.getElementById('quizBox').style.animation = 'none';
        setTimeout(() => {
          document.getElementById('quizBox').style.animation = 'fadeInUp 0.8s ease';
          loadQuestion();
        }, 100);
      }
    }

    function showEnd() {
      document.getElementById('quizBox').classList.add('hidden');
      document.getElementById('scoreDisplay').classList.add('hidden');
      document.getElementById('endScreen').classList.remove('hidden');
      document.getElementById('finalScore').textContent = `${failCount} tentatives de triche déjouées 😂`;
      document.getElementById('endMessage').innerHTML =
        `Mon amour,<br><br>` +
        `Depuis 2 ans, tu es la meilleure chose qui me soit arrivée.<br>` +
        `Même quand tu veux cliquer sur "non", je sais que au fond...<br>` +
        `tu penses "oui" 💕<br><br>` +
        `Joyeux anniversaire de mariage, mon cœur.<br>` +
        `Pour toujours et à jamais.`;
      launchConfetti();
      setInterval(launchConfetti, 3000);
    }

    // ============= PIÈGES =============
    function setupTrap(type) {
      const btn = document.getElementById('btnTrap');
      const container = document.getElementById('buttonsContainer');

      // Remove old listeners
      const newBtn = btn.cloneNode(true);
      btn.parentNode.replaceChild(newBtn, btn);

      newBtn.onmouseenter = null;
      newBtn.onmousemove = null;
      newBtn.onclick = () => { failCount++; updateScore(); };

      switch(type) {
        case 'runaway':
          newBtn.style.position = 'absolute';
          newBtn.onmouseenter = () => {
            const rect = container.getBoundingClientRect();
            const maxX = rect.width - newBtn.offsetWidth - 20;
            const maxY = rect.height - newBtn.offsetHeight - 20;
            newBtn.style.left = Math.random() * maxX + 'px';
            newBtn.style.top = Math.random() * maxY + 'px';
            failCount++;
            updateScore();
          };
          break;

        case 'shrink':
          newBtn.onmouseenter = () => {
            const scale = Math.max(0.3, 1 - (trapClicks * 0.15));
            newBtn.style.transform = `scale(${scale})`;
            trapClicks++;
            failCount++;
            updateScore();
            if (scale <= 0.35) {
              newBtn.textContent = "Trop tard 😂";
            }
          };
          break;

        case 'teleport':
          newBtn.style.position = 'absolute';
          newBtn.onmousemove = (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const newX = Math.random() * (rect.width - 100);
            const newY = Math.random() * (rect.height - 50);
            if (Math.abs(x - parseFloat(newBtn.style.left || 0)) < 80 &&
                Math.abs(y - parseFloat(newBtn.style.top || 0)) < 40) {
              newBtn.style.left = newX + 'px';
              newBtn.style.top = newY + 'px';
              failCount++;
              updateScore();
            }
          };
          break;

        case 'multiply':
          newBtn.onmouseenter = () => {
            if (document.querySelectorAll('.btn-trap-clone').length > 6) return;
            const clone = newBtn.cloneNode(true);
            clone.classList.add('btn-trap-clone');
            clone.style.position = 'absolute';
            clone.style.left = Math.random() * 200 + 'px';
            clone.style.top = Math.random() * 100 + 'px';
            clone.style.fontSize = '0.8rem';
            clone.style.padding = '10px 20px';
            clone.textContent = ["Lui 🧔","Lui 😎","Lui 🤓","Lui 🥸"][Math.floor(Math.random()*4)];
            clone.onclick = () => { failCount++; updateScore(); };
            container.appendChild(clone);
            failCount++;
            updateScore();
          };
          break;

        case 'chase':
          newBtn.style.position = 'absolute';
          newBtn.onmousemove = (e) => {
            const rect = container.getBoundingClientRect();
            const btnRect = newBtn.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const btnX = btnRect.left - rect.left + btnRect.width/2;
            const btnY = btnRect.top - rect.top + btnRect.height/2;
            const dx = btnX - mouseX;
            const dy = btnY - mouseY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 120) {
              const angle = Math.atan2(dy, dx);
              const push = 60;
              let newX = btnX + Math.cos(angle) * push - btnRect.width/2;
              let newY = btnY + Math.sin(angle) * push - btnRect.height/2;
              newX = Math.max(0, Math.min(rect.width - btnRect.width, newX));
              newY = Math.max(0, Math.min(rect.height - btnRect.height, newY));
              newBtn.style.left = newX + 'px';
              newBtn.style.top = newY + 'px';
              failCount++;
              updateScore();
            }
          };
          break;
      }
    }

    function updateScore() {
      document.getElementById('failCount').textContent = failCount;
    }
  </script>
</body>
</html>
